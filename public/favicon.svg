    <line x1="16" y1="10.5" x2="11.5" y2="22" />
    <line x1="16" y1="10.5" x2="20.5" y2="22" />
  </g>

  <!-- 葉片 + 梗 -->
  <path fill="url(#leaf)" d="M16.3 8.5c2.4-2.2 6.5-1.5 7.4 1.2-2.3.5-4-.3-7.4-1.2Z" />
  <path fill="none" stroke="#047857" stroke-width="1" stroke-linecap="round" d="M16.3 8.5V6.5" />

